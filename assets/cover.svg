  <text x="500" y="960" text-anchor="middle" font-size="20" fill="#94a3b8">เวิร์กโฟลว์ AI 6 เดือน — พรอมต์ · โค้ด · การตรวจสอบ ครบถ้วน</text>

  <!-- stat chips -->
